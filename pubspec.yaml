name: flameguard
description: FlameGuard Smart Fire Risk Protection System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0        # Outfit font
  fl_chart: ^0.68.0           # Analytics charts
  smooth_page_indicator: ^1.1.0  # Onboarding dots
  provider: ^6.1.1            # State management
  shared_preferences: ^2.2.2  # Theme persistence
  mobile_scanner: ^5.1.0      # Real QR Scanning
  firebase_core: ^2.30.0      # Firebase Core
  firebase_auth: ^4.17.0      # Firebase Authentication
  google_sign_in: ^6.2.1    # Google OAuth
  sign_in_with_apple: ^5.0.0  # Apple Sign In
  flutter_facebook_auth: ^7.0.0  # Facebook OAuth
  qr: ^3.0.1                  # QR code generation
  image_gallery_saver: ^2.0.3 # Save images to gallery
  http: ^1.2.1                # HTTP requests
  mqtt_client: ^10.0.0        # MQTT for ESP32 communication

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.2.11

flutter_icons:
  image_path: "assets/FLAMEGUARD.png"
  android: true
  ios: false
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/FLAMEGUARD.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/FLAMEGUARD.png
  color_dark: "#000000"
  image_dark: assets/FLAMEGUARD..png
  android_12:
    image: assets/FLAMEGUARD.png
    image_dark: assets/FLAMEGUARD..png
    color: "#FFFFFF"
    color_dark: "#000000"

flutter:
  uses-material-design: true
  assets:
    - assets/